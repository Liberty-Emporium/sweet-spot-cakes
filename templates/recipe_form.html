{% extends 'base.html' %}
{% block title %}New Recipe — {{ bakery }}{% endblock %}
{% block page_title %}📖 New Recipe{% endblock %}
{% block content %}
<div style="max-width:600px">
  <a href="/recipes" class="btn btn-ghost btn-sm" style="margin-bottom:16px">← Back to Recipes</a>
  <div class="card">
    <div class="card-title" style="margin-bottom:16px">Create New Recipe</div>
    <form method="POST">
      <div class="form-row">
        <div class="form-group"><label class="form-label">Recipe Name *</label><input name="name" class="form-control" required placeholder="Classic Vanilla Birthday Cake"></div>
        <div class="form-group"><label class="form-label">Category</label>
          <select name="category" class="form-control"><option>Cake</option><option>Cupcakes</option><option>Cookies</option><option>Pie</option><option>Bread</option><option>Frosting</option><option>Filling</option><option>Other</option></select>
        </div>
      </div>
      <div class="form-group"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="2" placeholder="Classic vanilla sponge with buttercream frosting..."></textarea></div>
      <div class="form-row-3">
        <div class="form-group"><label class="form-label">Servings</label><input name="servings" type="number" class="form-control" value="12"></div>
        <div class="form-group"><label class="form-label">Prep Time (min)</label><input name="prep_mins" type="number" class="form-control" value="60"></div>
        <div class="form-group"><label class="form-label">Bake Time (min)</label><input name="bake_mins" type="number" class="form-control" value="45"></div>
      </div>
      <div class="form-group"><label class="form-label">Base Price $</label><input name="base_price" type="number" step="0.01" class="form-control" value="45.00"></div>
      <button type="submit" class="btn btn-primary">Create Recipe →</button>
    </form>
  </div>
</div>
{% endblock %}
